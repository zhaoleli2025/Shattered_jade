<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碎玉 · 舆图 — Shattered Jade strategic map</title>
<!-- fonts load async: a slow/blocked CDN must never blank the page -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" media="print" onload="this.media='all'">
<style>
  :root {
    --paper: #ece3cd; --paper-dark: #e0d4b8; --ink: #2b2620; --ink-soft: #5b5346;
    --player: #1b4965; --enemy: #8c2f1b; --gold: #b8860b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "LXGW WenKai", "Noto Serif SC", "Songti SC", Georgia, serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: baseline; gap: 16px; padding: 8px 16px;
    border-bottom: 2px solid var(--ink-soft); background: var(--paper-dark);
    flex: 0 0 auto;
  }
  header h1 { font-size: 20px; margin: 0; letter-spacing: 2px; }
  header .sub { font-size: 12px; color: var(--ink-soft); }
  header .spacer { flex: 1; }
  header .stat { font-size: 13.5px; color: var(--ink); font-family: "Noto Sans SC", sans-serif; }
  header a.navlink {
    font-size: 13px; color: var(--ink-soft); text-decoration: none;
    border: 1px solid var(--ink-soft); border-radius: 3px; padding: 3px 10px;
  }
  header a.navlink:hover { background: var(--paper); }
  button {
    font-family: inherit; font-size: 14px; padding: 5px 14px; cursor: pointer;
    background: var(--ink); color: var(--paper); border: none; border-radius: 3px;
  }
  button:hover { background: #463f35; }
  button:disabled { background: #9a917f; cursor: default; }
  #main { display: flex; flex: 1 1 auto; min-height: 0; }
  #boardwrap { flex: 1 1 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 4px; position: relative; }
  svg#board { display: block; width: 100%; height: 100%; }
  #citypanel {
    position: absolute; right: 0; top: 0; bottom: 0; z-index: 6;
    display: none; width: 330px; overflow-y: auto;
    background: rgba(43,38,32,.95); color: var(--paper);
    padding: 10px 14px; font-size: 13px; line-height: 1.6;
    border-left: 2px solid var(--gold); box-shadow: -6px 0 18px rgba(0,0,0,.35);
  }
  #citypanel details { margin: 4px 0 4px 8px; }
  #citypanel details details { margin-left: 18px; }
  #citypanel summary {
    cursor: pointer; list-style: none; font-weight: bold; color: #e8d9b0;
    padding: 2px 0; user-select: none;
  }
  #citypanel summary::before { content: "▸ "; color: var(--gold); }
  #citypanel details[open] > summary::before { content: "▾ "; }
  #citypanel .leaf { margin-left: 26px; }
  /* the active 镖单, captioned over the map — always visible while one is in hand */
  #contractcap {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 5; display: none; max-width: 64%;
    background: rgba(43,38,32,.92); color: #f0d9a6;
    border: 1px solid var(--gold); border-radius: 5px;
    padding: 5px 14px; font-size: 13px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; pointer-events: none;
    box-shadow: 0 3px 12px rgba(0,0,0,.35); font-family: "Noto Sans SC", sans-serif;
  }
  #contractcap b { color: var(--gold); }
  #townbtn {
    position: absolute; right: 12px; top: 12px; z-index: 5; display: none;
    background: var(--gold); color: #fff; font-weight: bold;
    border-radius: 4px; padding: 6px 14px;
  }
  #zoomctl {
    position: absolute; right: 12px; bottom: 12px; z-index: 5;
    display: flex; flex-direction: column; gap: 6px;
  }
  #zoomctl button {
    width: 38px; height: 34px; font-size: 17px; font-weight: bold;
    background: rgba(43,38,32,.88); color: var(--paper);
    border: 1px solid var(--ink-soft); border-radius: 5px;
  }
  /* unit inspector: click a settlement / party / 镖队 to read it (a 查看 card) */
  #inspector {
    position: absolute; z-index: 7; display: none; width: 232px; max-width: 70%;
    background: rgba(43,38,32,.96); color: var(--paper);
    border: 1px solid var(--gold); border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,.4);
    padding: 9px 11px 11px; font-size: 12.5px; line-height: 1.55;
    font-family: "Noto Sans SC", sans-serif;
  }
  #inspector .ihead { display: flex; align-items: baseline; gap: 6px; margin-bottom: 3px; }
  #inspector .iname { font-size: 15px; font-weight: bold; color: #f0d9a6;
    font-family: "LXGW WenKai", "Noto Serif SC", serif; letter-spacing: 1px; }
  #inspector .itag { font-size: 11px; padding: 1px 6px; border-radius: 3px;
    background: rgba(255,255,255,.12); color: #e8d9b0; }
  #inspector .iclose { margin-left: auto; cursor: pointer; color: #c9bda0;
    font-size: 16px; line-height: 1; padding: 0 2px; user-select: none; }
  #inspector .iclose:hover { color: #fff; }
  #inspector .irow { color: #d8cdb2; margin: 1px 0; }
  #inspector .irow b { color: #f0d9a6; }
  #inspector .iacts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  #inspector button {
    font-size: 12px; padding: 3px 11px; background: #6e5a28;
    color: var(--paper); border: none; border-radius: 3px; cursor: pointer;
    font-family: inherit;
  }
  #inspector button:hover { background: #846e36; }
  #inspector button.prey { background: #6e3328; }
  #inspector button.prey:hover { background: #8c4233; }
  #inspector button:disabled { background: #5a544a; color: #9a917f; cursor: default; }
  /* 校阅 — the roving roster panel, openable anywhere (mirrors the town drawer) */
  #musterpanel {
    position: absolute; right: 0; top: 0; bottom: 0; z-index: 6;
    display: none; width: 330px; overflow-y: auto;
    background: rgba(43,38,32,.95); color: var(--paper);
    padding: 10px 14px; font-size: 13px; line-height: 1.6;
    border-left: 2px solid var(--gold); box-shadow: -6px 0 18px rgba(0,0,0,.35);
  }
  #musterpanel > b { color: #f0d9a6; }
  #musterpanel h4 {
    margin: 8px 0 2px; font-size: 12px; letter-spacing: 1px; color: #c9bda0;
    border-bottom: 1px solid rgba(201,189,160,.35); padding-bottom: 2px;
  }
  #musterpanel .mrow { margin: 3px 0; padding: 2px 4px 3px;
    border-bottom: 1px dotted rgba(201,189,160,.22); border-radius: 3px; }
  #musterpanel .mclick { cursor: pointer; }
  #musterpanel .mclick:hover { background: rgba(240,217,166,.10); }
  #musterpanel .mrow b { color: #f0d9a6; }
  #musterpanel .msub { color: #c9bda0; font-size: 11px; }
  #musterpanel .mstat { color: #d8cdb2; font-size: 11px; margin-top: 1px; }
  #musterpanel .mtrait { color: #b3a98c; font-size: 11px; margin: 1px 0 0 8px; }
  #musterpanel .mgear { font-size: 11px; color: #c9bda0; margin: 2px 0 0 8px; }
  #musterpanel .gchip {
    display: inline-block; cursor: pointer; padding: 0 5px; margin: 1px 3px 1px 0;
    border: 1px solid rgba(201,189,160,.35); border-radius: 3px;
    background: rgba(255,255,255,.05); color: #d8cdb2;
  }
  #musterpanel .gchip:hover { background: rgba(240,217,166,.14); }
  #musterpanel .gsel { border-color: var(--gold); background: rgba(184,134,11,.30); color: #f0d9a6; }
  #musterpanel button {
    font-size: 11.5px; padding: 2px 7px; background: #6e5a28; color: var(--paper);
    border: none; border-radius: 3px; cursor: pointer; font-family: inherit;
  }
  #musterpanel button:hover { background: #846e36; }
  #citypanel b { color: #f0d9a6; }
  #citypanel h4 {
    margin: 7px 0 3px; font-size: 12px; letter-spacing: 1px; color: #c9bda0;
    border-bottom: 1px solid rgba(201,189,160,.35); padding-bottom: 2px;
  }
  #citypanel button {
    font-size: 11.5px; padding: 2px 7px; background: #6e5a28; border-radius: 3px;
  }
  #citypanel button:hover { background: #846e36; }
  #citypanel button:disabled { background: #5a544a; color: #9a917f; }
  #citypanel .job { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  #citypanel .job span { flex: 1 1 auto; }
  #citypanel .hero { margin: 4px 0; }
  #citypanel .slots { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  #panel {
    flex: 0 0 330px; border-left: 2px solid var(--ink-soft); background: var(--paper-dark);
    display: flex; flex-direction: column; min-height: 0;
  }
  #panel h3 {
    margin: 0; padding: 6px 12px 4px; font-size: 13px; letter-spacing: 1px;
    color: var(--ink-soft); border-bottom: 1px solid #c9bda0;
  }
  #hoverinfo {
    padding: 8px 12px; font-size: 12.5px; line-height: 1.5; min-height: 72px;
    font-family: "Noto Sans SC", sans-serif; white-space: pre-line;
  }
  #log {
    flex: 1 1 auto; overflow-y: auto; padding: 8px 12px; font-size: 12px;
    line-height: 1.55; font-family: "Noto Sans SC", sans-serif;
  }
  #log .r { color: #6b3a2a; }
  #log .b { color: #24506e; }
  #log .sys { color: var(--ink-soft); font-style: italic; }
  #log div { margin-bottom: 2px; border-bottom: 1px dotted #d6cab0; padding-bottom: 2px; }
  .hex { stroke: #8d8268; stroke-width: .6; cursor: default; }
  .hex.reach { cursor: pointer; }
  .hex.reach:hover { stroke: var(--player); stroke-width: 2; }
  .tglyph { fill: #8d8268; font-size: 9px; text-anchor: middle; pointer-events: none;
            font-family: "LXGW WenKai", "Noto Serif SC", serif; }
  .glyph { fill: #f5efe0; font-size: 10px; text-anchor: middle; pointer-events: none;
           font-family: "LXGW WenKai", "Noto Serif SC", serif; }
  .plabel { font-size: 9px; fill: #3d362c; text-anchor: middle; pointer-events: none;
            paint-order: stroke; stroke: rgba(236,227,205,.78); stroke-width: 2.5px;
            font-family: "LXGW WenKai", "Noto Serif SC", serif; }
  .slabel { font-size: 8px; fill: #6b6254; text-anchor: middle; pointer-events: none;
            paint-order: stroke; stroke: rgba(236,227,205,.78); stroke-width: 2px;
            font-family: "LXGW WenKai", "Noto Serif SC", serif; }
  .wlabel { font-size: 26px; fill: rgba(91,83,70,.35); text-anchor: middle;
            pointer-events: none; letter-spacing: 8px;
            font-family: "LXGW WenKai", "Noto Serif SC", serif; }
  #overlay {
    position: fixed; inset: 0; background: rgba(40,34,26,.78); display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 18px;
    color: var(--paper); z-index: 10; text-align: center;
  }
  #overlay h2 { font-size: 42px; margin: 0; letter-spacing: 8px; }
  #overlay p { max-width: 460px; line-height: 1.7; }
  #ovbtns { display: flex; gap: 14px; }
  #ovbtns button.go { background: #6e3328; }
  #ovbtns button.go:hover { background: #8c4233; }
</style>
</head>
<body>
<header>
  <h1>碎玉 · 舆图</h1>
  <select id="worldpick" style="font-family:inherit;font-size:13px;padding:3px 6px;background:var(--paper);color:var(--ink);border:1px solid var(--ink-soft);border-radius:3px;">
    <option value="hebei">河北南部 · 试点区</option>
    <option value="henan">河南 · 京畿</option>
    <option value="zhongyuan">中原 · 全舆图</option>
  </select>
  <span class="sub" id="subtitle"></span>
  <span class="spacer"></span>
  <span class="stat" id="daylabel">第 1 日</span>
  <span class="stat" id="provlabel">粮草 12/12</span>
  <span class="stat" id="goldlabel">银两 100</span>
  <span class="stat" id="contractlabel" style="color:#6b5520"></span>
  <span class="stat" id="loclabel"></span>
  <button id="musterbtn">校阅</button>
  <button id="assault" style="display:none">攻寨</button>
  <button id="campbtn">扎营一日</button>
  <button id="restartw">重开</button>
  <a class="navlink" href="index.html">战斗原型</a>
</header>
<div id="main">
  <div id="boardwrap"><svg id="board"></svg><div id="citypanel"></div>
    <div id="musterpanel"></div>
    <div id="inspector"></div>
    <div id="contractcap"></div>
    <button id="townbtn">入城</button>
    <div id="zoomctl">
      <button onclick="uiZoom(1.25)" title="放大">＋</button>
      <button onclick="uiZoom(0.8)" title="缩小">－</button>
      <button onclick="uiCenter()" title="回到镖队">⌖</button>
    </div></div>
  <div id="panel">
    <h3>移动预览 · 悬停舆图</h3>
    <div id="hoverinfo">悬停可达之处查看路线与行程，点击空地即出发。点城寨、商旅、巡骑或自家镖队（圆点）可查看详情。拖拽或贴边可挪图，滚轮缩放。官道日行八格，山林减半；大河层峦不可逾，须寻渡桥关陉。粮草须在市集购买。</div>
    <h3>行程日志 · 风尘镖路</h3>
    <div id="log"></div>
  </div>
</div>
<div id="overlay">
  <h2 id="ovtitle"></h2>
  <p id="ovtext"></p>
  <div id="ovbtns">
    <button id="ovfight" class="go">开战</button>
    <button id="ovflee">脱离</button>
  </div>
</div>
<script src="world.js?v=001"></script>
</body>
</html>
